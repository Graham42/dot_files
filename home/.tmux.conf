# ~/.tmux.conf

###########################################################################
# Remap prefix from default (C-b) to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

###########################################################################
# General options

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# scrollback size
set -g history-limit 50000

# pass through xterm keys (allow ctrl left, right etc)
set -g xterm-keys on

# Use vim like keys
# for tmux-yank
set -g @shell_mode 'vi'
set -g mode-keys vi

# If on a OLDER Mac...
# if-shell 'test "$(uname -s)" = Darwin' 'set-option -g default-command "exec reattach-to-user-namespace -l bash"'

# enable mouse scrolling
set -g mouse on

###########################################################################
# General keymap

# reload tmux config
#unbind r
#bind r \
#    source-file ~/.tmux.conf \;\
#    display 'Reloaded tmux config.'

# open panes in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

###########################################################################
# Plugins
# To install plugins:  prefix + I
# To update plugins:   prefix + U
# To remove plugins:   prefix + alt + u  (removes unlisted plugins)

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'
# Theme
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'double/cyan'
# Share clipboard with system
set -g @plugin 'tmux-plugins/tmux-yank'

# start the plugin manager, must be at bottom of conf file
run '~/.tmux/plugins/tpm/tpm'
